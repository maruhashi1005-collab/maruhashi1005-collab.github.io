<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>KintaiPC 出勤打刻</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      background: #F0F4F8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 40px 28px;
      text-align: center;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(30,58,95,0.12);
    }
    h1 { color: #1E3A5F; font-size: 20px; margin: 16px 0 8px; }
    p  { color: #667788; font-size: 15px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <p style="font-size:48px;margin:0;">📱</p>
    <h1>KintaiPC アプリが必要です</h1>
    <p>出勤打刻するには、iPhone に KintaiPC アプリをインストールしてください。</p>
  </div>
</body>
</html>
